# Nvidia fixes
env = WLR_NO_HARDWARE_CURSORS,1
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,drm

# Wayland x11 fixes
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland,x11
env = CLUTTER_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland 

env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
env = XCURSOR_SIZE,24

xwayland {
  force_zero_scaling = true
}


# Right monitor (Philips, center)
monitor = DP-5,3840x2160@143.98,0x560,1.5

# Left monitor (LG, portrait on the left)
monitor = DP-4,3840x2160@143.98,-1440x0,1.5,transform,1

workspace = 1, monitor:DP-5

input {
  kb_layout = us
}

general {
  border_size = 1
  gaps_in = 4
  gaps_out = 6
}

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpaper

# KEYBINDINGS (i3-style) 

$mod = SUPER

bind = $mod SHIFT, S, exec, systemctl suspend

# WORKSPACE PAIRS (one per monitor)
# Main monitor workspaces
workspace = 1,  monitor:DP-5, persistent:true
workspace = 2,  monitor:DP-5, persistent:true
workspace = 3,  monitor:DP-5, persistent:true
workspace = 4,  monitor:DP-5, persistent:true
workspace = 5,  monitor:DP-5, persistent:true
workspace = 6,  monitor:DP-5, persistent:true

# Side monitor workspaces
workspace = 11, monitor:DP-4, persistent:true
workspace = 12, monitor:DP-4, persistent:true
workspace = 13, monitor:DP-4, persistent:true
workspace = 14, monitor:DP-4, persistent:true
workspace = 15, monitor:DP-4, persistent:true
workspace = 16, monitor:DP-4, persistent:true

# MODE SWITCHING (switch both monitors together)
bind = $mod, 1, exec, hyprctl dispatch workspace 1  && hyprctl dispatch workspace 11
bind = $mod, 2, exec, hyprctl dispatch workspace 2  && hyprctl dispatch workspace 12
bind = $mod, 3, exec, hyprctl dispatch workspace 3  && hyprctl dispatch workspace 13
bind = $mod, 4, exec, hyprctl dispatch workspace 4  && hyprctl dispatch workspace 14
bind = $mod, 5, exec, hyprctl dispatch workspace 5  && hyprctl dispatch workspace 15
bind = $mod, 6, exec, hyprctl dispatch workspace 6  && hyprctl dispatch workspace 16

# (Optional) also allow direct access to side workspaces
bind = $mod, F1, workspace, 11
bind = $mod, F2, workspace, 12
bind = $mod, F3, workspace, 13
bind = $mod, F4, workspace, 14
bind = $mod, F5, workspace, 15
bind = $mod, F6, workspace, 16

# Move focus (feels like one big space)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Move windows across monitors
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Move windows to workspaces
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6

# No animations
animations {
  enabled = no
}

# Mouse move/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Launchers
bind = $mod, Return, exec, kitty
bind = $mod, D, exec, wofi --show drun
bind = $mod, S, exec, hyprshot -m region -o active --clipboard-only

# Basic window controls
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exit
bind = $mod, Space, togglefloating
bind = $mod, F, fullscreen
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod, V, togglesplit

# Mouse carries focus
input {
  follow_mouse = 1
}

# Layout behavior
dwindle {
  smart_split = true
  preserve_split = true
}

# Global scratchpad (chat / music / notes)
bind = $mod, C, togglespecialworkspace

##############################
# Startup focus (ensure mode 1 on login)
##############################
exec-once = hyprctl dispatch workspace 1
exec-once = hyprctl dispatch workspace 11

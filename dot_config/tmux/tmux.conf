# let tmux cooperate with system clipboard
set -g set-clipboard external

# Wayland: copy tmux selection to clipboard (mouse selection / copy-mode)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y     send -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "wl-copy"

# ---------- Basics ----------
set -g mouse on
set -g history-limit 100000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# ---------- Prefix ----------
# Use Ctrl-a instead of Ctrl-b
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix
#
# ---------- Splits ----------
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# ---------- Pane navigation (vim-style) ----------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with repeat
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------- Quality of life ----------
set -g escape-time 0
set -g renumber-windows on
set -g focus-events on
set -g detach-on-destroy on

# vim-tmux-navigator (tmux side)
run-shell "~/.local/share/nvim/lazy/vim-tmux-navigator/vim-tmux-navigator.tmux"

# ----------------------------
# Catppuccin (base)
# ----------------------------
set -g @catppuccin_flavour "mocha"
set -g @catppuccin_status_background "none"
run-shell ~/.config/tmux/catppuccin/catppuccin.tmux

set -g status-left " 󰰡 #S "
set -g window-status-format "#[bg=#1a1b2c]#[fg=#8087a2]#I #W  #[fg=#8087a2]"
set -g window-status-current-format "#I #W  "
# setw -g window-status-style "fg=default,bg=default"
# setw -g window-status-current-style "fg=default,bg=default"
set -g status-justify centre
set -g status-right ' %H:%M '


# ---------- Reload ----------
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux reloaded"
